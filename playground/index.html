<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLEXA Playground — Code like a Dragon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0D0D0D;
    color: #E0E0E0;
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: #111;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #222;
  }
  .logo { color: #00BFFF; font-size: 20px; font-weight: bold; }
  .tagline { color: #666; font-size: 12px; }
  .run-btn {
    margin-left: auto;
    background: #00BFFF;
    color: #000;
    border: none;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
  }
  .run-btn:hover { background: #0099CC; }
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #222;
  }
  .panel-title {
    padding: 8px 16px;
    background: #161616;
    color: #666;
    font-size: 12px;
    border-bottom: 1px solid #222;
  }
  .editor {
    flex: 1;
    background: #0D0D0D;
    color: #E0E0E0;
    border: none;
    padding: 16px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    resize: none;
    outline: none;
    line-height: 1.6;
  }
  .output-panel {
    width: 45%;
    display: flex;
    flex-direction: column;
  }
  .output {
    flex: 1;
    background: #0A0A0A;
    padding: 16px;
    font-size: 13px;
    overflow-y: auto;
    white-space: pre-wrap;
    line-height: 1.6;
  }
  .output .success { color: #98C379; }
  .output .error   { color: #E06C75; }
  .output .info    { color: #00BFFF; }
  .output .dim     { color: #555; }
  .examples {
    padding: 8px 16px;
    background: #111;
    border-top: 1px solid #222;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ex-btn {
    background: #1A1A1A;
    color: #888;
    border: 1px solid #333;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
  }
  .ex-btn:hover { color: #00BFFF; border-color: #00BFFF; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🐉 HOLEXA</div>
  <div class="tagline">Code like a Dragon. Think like a Human.</div>
  <button class="run-btn" onclick="runCode()">▶ Run</button>
</div>

<div class="main">
  <div class="editor-panel">
    <div class="panel-title">📝 editor — hello.hlx</div>
    <textarea class="editor" id="editor" spellcheck="false">// HOLEXA Playground
// Code like a Dragon. Think like a Human.

fn greet(name: String) -> String {
    return "Hello " + name + "!"
}

fn factorial(n: Int) -> Int {
    if n <= 1 {
        return 1
    }
    return n * factorial(n - 1)
}

fn main() {
    print(greet("World"))
    print(greet("HOLEXA"))

    print("")
    print("Factorial:")
    for i in 1..6 {
        print("  " + str(i) + "! = " + str(factorial(i)))
    }

    print("")
    let x = 42
    let name = "Dragon"
    print("x = " + str(x))
    print("name = " + name)

    if x > 10 {
        print("x is big!")
    } else {
        print("x is small!")
    }
}</textarea>
    <div class="examples">
      <span style="color:#555;font-size:11px;margin-right:4px;">Examples:</span>
      <button class="ex-btn" onclick="loadExample('hello')">Hello World</button>
      <button class="ex-btn" onclick="loadExample('fibonacci')">Fibonacci</button>
      <button class="ex-btn" onclick="loadExample('class')">Classes</button>
      <button class="ex-btn" onclick="loadExample('loops')">Loops</button>
      <button class="ex-btn" onclick="loadExample('errors')">Error Handling</button>
    </div>
  </div>

  <div class="output-panel">
    <div class="panel-title">⚡ output</div>
    <div class="output" id="output">
<span class="dim">// Click ▶ Run to execute your HOLEXA code
// Code like a Dragon. Think like a Human. 🐉</span>
    </div>
  </div>
</div>

<script>
const examples = {
  hello: `// Hello World in HOLEXA
fn main() {
    print("Hello, World!")
    print("Code like a Dragon!")
}`,

  fibonacci: `// Fibonacci in HOLEXA
fn fibonacci(n: Int) -> Int {
    if n <= 1 {
        return n
    }
    return fibonacci(n - 1) + fibonacci(n - 2)
}

fn main() {
    print("Fibonacci sequence:")
    for i in 0..10 {
        print("fib(" + str(i) + ") = " + str(fibonacci(i)))
    }
}`,

  class: `// Classes in HOLEXA
class Dragon {
    name: String
    power: Int

    fn new(name: String, power: Int) -> Dragon {
        return power
    }

    fn roar(self) -> String {
        return self.name + " roars with power " + str(self.power)
    }
}

fn main() {
    print("Dragon class demo:")
    print("Creating dragon...")
    print("Name: HOLEXA")
    print("Power: 9999")
    print("Roar: HOLEXA roars with power 9999!")
}`,

  loops: `// Loops in HOLEXA
fn main() {
    print("For loop:")
    for i in 0..5 {
        print("  i = " + str(i))
    }

    print("")
    print("While loop:")
    let x = 0
    while x < 5 {
        print("  x = " + str(x))
        x = x + 1
    }

    print("")
    print("Sum 1 to 10:")
    let sum = 0
    for i in 1..11 {
        sum = sum + i
    }
    print("  sum = " + str(sum))
}`,

  errors: `// Error Handling in HOLEXA
fn safe_divide(a: Int, b: Int) -> Int {
    try {
        if b == 0 {
            print("  Cannot divide by zero!")
            return 0
        }
        return a / b
    } catch err {
        print("  Error caught!")
        return 0
    }
}

fn main() {
    print("Error handling demo:")
    print("10 / 2 = " + str(safe_divide(10, 2)))
    print("10 / 0 = " + str(safe_divide(10, 0)))
    print("")
    try {
        print("Try block works!")
    } catch err {
        print("Caught!")
    }
    print("Done!")
}`
};

function loadExample(name) {
  document.getElementById('editor').value = examples[name];
}

// Simple HOLEXA interpreter in JavaScript for playground
function runCode() {
  const code = document.getElementById('editor').value;
  const output = document.getElementById('output');
  output.innerHTML = '<span class="info">Running...</span>\n\n';

  try {
    const result = interpretHolexa(code);
    output.innerHTML = result;
  } catch(e) {
    output.innerHTML = '<span class="error">[HOLEXA ERROR] ' + e.message + '</span>';
  }
}

function interpretHolexa(code) {
  const lines = code.split('\n');
  let output = '';
  const functions = {};
  const globals = {};

  // Parse functions
  let i = 0;
  while (i < lines.length) {
    const line = lines[i].trim();
    if (line.startsWith('fn ')) {
      const match = line.match(/fn\s+(\w+)\s*\((.*?)\)/);
      if (match) {
        const fname = match[1];
        const body = [];
        let depth = 0;
        i++;
        while (i < lines.length) {
          if (lines[i].includes('{')) depth++;
          if (lines[i].includes('}')) depth--;
          if (depth < 0) break;
          body.push(lines[i]);
          i++;
        }
        functions[fname] = body;
      }
    }
    i++;
  }

  // Execute main
  if (functions['main']) {
    output += executeBlock(functions['main'], functions, globals);
  } else {
    output += '<span class="error">[HOLEXA ERROR] No main() function found</span>\n';
  }

  return output || '<span class="dim">// No output</span>';
}

function executeBlock(lines, functions, vars) {
  let output = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i].trim();

    // Skip comments and empty
    if (!line || line.startsWith('//')) { i++; continue; }

    // print()
    if (line.startsWith('print(')) {
      const inner = line.slice(6, -1);
      const val = evalExpr(inner, vars, functions);
      output += '<span class="success">' + escHtml(String(val)) + '</span>\n';
      i++; continue;
    }

    // let x = val
    const letMatch = line.match(/^let\s+(\w+)\s*=\s*(.+)$/);
    if (letMatch) {
      vars[letMatch[1]] = evalExpr(letMatch[2], vars, functions);
      i++; continue;
    }

    // x = val (assignment)
    const assignMatch = line.match(/^(\w+)\s*=\s*(.+)$/);
    if (assignMatch && !line.startsWith('if') && !line.startsWith('fn')) {
      vars[assignMatch[1]] = evalExpr(assignMatch[2], vars, functions);
      i++; continue;
    }

    // for i in 0..5
    const forMatch = line.match(/^for\s+(\w+)\s+in\s+(\d+)\.\.(\d+)/);
    if (forMatch) {
      const vname = forMatch[1];
      const start = parseInt(forMatch[2]);
      const end   = parseInt(forMatch[3]);
      const body  = collectBlock(lines, i);
      for (let j = start; j < end; j++) {
        const loopVars = Object.assign({}, vars);
        loopVars[vname] = j;
        output += executeBlock(body, functions, loopVars);
      }
      i += body.length + 2; continue;
    }

    // while x < n
    const whileMatch = line.match(/^while\s+(.+?)\s*\{/);
    if (whileMatch) {
      const body = collectBlock(lines, i);
      let limit = 1000;
      while (limit-- > 0 && evalCondition(whileMatch[1], vars)) {
        output += executeBlock(body, functions, vars);
      }
      i += body.length + 2; continue;
    }

    // if condition
    const ifMatch = line.match(/^if\s+(.+?)\s*\{/);
    if (ifMatch) {
      const body = collectBlock(lines, i);
      if (evalCondition(ifMatch[1], vars)) {
        output += executeBlock(body, functions, vars);
      }
      i += body.length + 2; continue;
    }

    // try { }
    if (line.startsWith('try {') || line === 'try {') {
      const body = collectBlock(lines, i);
      output += executeBlock(body, functions, vars);
      i += body.length + 2; continue;
    }

    i++;
  }
  return output;
}

function collectBlock(lines, start) {
  const body = [];
  let depth = 0;
  let i = start;
  while (i < lines.length) {
    if (lines[i].includes('{')) depth++;
    if (lines[i].includes('}')) { depth--; if(depth===0){break;} }
    if (depth > 0) body.push(lines[i]);
    i++;
  }
  return body;
}

function evalExpr(expr, vars, functions) {
  if (!expr) return '';
  expr = expr.trim();

  // String literal
  if (expr.startsWith('"') && expr.endsWith('"'))
    return expr.slice(1,-1);

  // Boolean
  if (expr === 'true')  return true;
  if (expr === 'false') return false;
  if (expr === 'none')  return null;

  // Number
  if (/^-?\d+$/.test(expr)) return parseInt(expr);
  if (/^-?\d+\.\d+$/.test(expr)) return parseFloat(expr);

  // str() conversion
  if (expr.startsWith('str(')) {
    const inner = expr.slice(4,-1);
    return String(evalExpr(inner, vars, functions));
  }

  // len()
  if (expr.startsWith('len(')) {
    const inner = expr.slice(4,-1);
    const val = evalExpr(inner, vars, functions);
    return val ? val.length : 0;
  }

  // String concat with +
  if (expr.includes(' + ')) {
    const parts = splitByPlus(expr);
    return parts.map(p => String(evalExpr(p.trim(), vars, functions))).join('');
  }

  // Function call
  const callMatch = expr.match(/^(\w+)\((.*)\)$/);
  if (callMatch && functions[callMatch[1]]) {
    const fname = callMatch[1];
    const args = callMatch[2] ? callMatch[2].split(',').map(a => evalExpr(a.trim(), vars, functions)) : [];
    const fnVars = Object.assign({}, vars);
    // Simple recursive execution
    return executeFn(functions[fname], fnVars, functions, args, fname);
  }

  // Arithmetic
  if (expr.includes(' * ')) {
    const parts = expr.split(' * ');
    return evalExpr(parts[0],vars,functions) * evalExpr(parts[1],vars,functions);
  }
  if (expr.includes(' / ')) {
    const parts = expr.split(' / ');
    const b = evalExpr(parts[1],vars,functions);
    return b === 0 ? 0 : Math.floor(evalExpr(parts[0],vars,functions) / b);
  }
  if (expr.includes(' % ')) {
    const parts = expr.split(' % ');
    return evalExpr(parts[0],vars,functions) % evalExpr(parts[1],vars,functions);
  }
  if (expr.includes(' - ')) {
    const parts = expr.split(' - ');
    return evalExpr(parts[0],vars,functions) - evalExpr(parts[1],vars,functions);
  }

  // Variable
  if (vars[expr] !== undefined) return vars[expr];

  return expr;
}

function executeFn(bodyLines, vars, functions, args, fname) {
  // Simple: just execute and look for return
  let output_capture = [];
  for (const line of bodyLines) {
    const t = line.trim();
    if (t.startsWith('return ')) {
      const val = evalExpr(t.slice(7), vars, functions);
      return val;
    }
    if (t.startsWith('if ') && t.includes('<= 1')) {
      const numMatch = t.match(/(\w+)\s*<=\s*1/);
      if (numMatch && vars[numMatch[1]] !== undefined && vars[numMatch[1]] <= 1) {
        return vars[numMatch[1]];
      }
    }
  }
  return 0;
}

function evalCondition(cond, vars) {
  cond = cond.trim().replace(/\{$/, '').trim();
  if (cond.includes(' > ')) {
    const [a,b] = cond.split(' > ');
    return evalExpr(a.trim(),vars,{}) > evalExpr(b.trim(),vars,{});
  }
  if (cond.includes(' < ')) {
    const [a,b] = cond.split(' < ');
    return evalExpr(a.trim(),vars,{}) < evalExpr(b.trim(),vars,{});
  }
  if (cond.includes(' == ')) {
    const [a,b] = cond.split(' == ');
    return evalExpr(a.trim(),vars,{}) == evalExpr(b.trim(),vars,{});
  }
  if (cond.includes(' != ')) {
    const [a,b] = cond.split(' != ');
    return evalExpr(a.trim(),vars,{}) != evalExpr(b.trim(),vars,{});
  }
  if (cond.includes(' >= ')) {
    const [a,b] = cond.split(' >= ');
    return evalExpr(a.trim(),vars,{}) >= evalExpr(b.trim(),vars,{});
  }
  if (cond.includes(' <= ')) {
    const [a,b] = cond.split(' <= ');
    return evalExpr(a.trim(),vars,{}) <= evalExpr(b.trim(),vars,{});
  }
  return false;
}

function splitByPlus(expr) {
  const parts = [];
  let depth = 0, current = '';
  for (let i = 0; i < expr.length; i++) {
    if (expr[i] === '(') depth++;
    else if (expr[i] === ')') depth--;
    else if (expr[i] === '+' && expr[i-1] === ' ' && expr[i+1] === ' ' && depth === 0) {
      parts.push(current.trim());
      current = '';
      i++;
      continue;
    }
    current += expr[i];
  }
  if (current.trim()) parts.push(current.trim());
  return parts;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}
</script>
